<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLibrary</title>
</head>
<body>
    <script src="script.js" defer></script>
    <h1>MyLibrary</h1>
    <div class="container">
        <div class="sidebar">
            <form action="#" id="book-form" >
                <p>Add new Book</p>
                <div class="inputs">
                    <label for="title">Title</label>
                    <input type="text" class="title" name="title" required>
                </div>
                <div class="inputs">
                    <label for="author">Author Name</label>
                    <input type="text" name="author" class="author" required>
                </div>
                <div class="inputs">
                    <label for="read">Have Read?</label>
                    <input type="checkbox"  name="read" class="read" value="false">
                </div>
                <div class="inputs">
                    <button type="submit">Submit</button>
                </div>
            </form>
        </div>
        <div id="cards"></div>
    </div>
</body>
</html>
